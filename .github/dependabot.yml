version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # Major better-sqlite3 bumps need manual validation against the Node
      # version in the Dockerfile before upgrading.
      - dependency-name: "better-sqlite3"
        update-types: ["version-update:semver-major"]
    groups:
      svelte:
        patterns: ["svelte", "@sveltejs/*", "svelte-*"]
        update-types: ["minor", "patch"]
      dev-deps:
        dependency-type: development
        update-types: ["minor", "patch"]
      runtime-minor:
        dependency-type: production
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # Don't auto-bump Node major versions — runtime deps (e.g. better-sqlite3)
      # may not support the new version yet. Upgrade manually when ready.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
