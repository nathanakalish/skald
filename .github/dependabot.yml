version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-deps:
        dependency-type: development
        update-types: ["minor", "patch"]
      runtime-patches:
        dependency-type: production
        update-types: ["patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # Don't auto-bump Node major versions — runtime deps (e.g. better-sqlite3)
      # may not support the new version yet. Upgrade manually when ready.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
