name: Post-CI

# Fires whenever the CI workflow finishes on a push to master or beta.
# Handles three distinct cases:
#   1. Dependabot merge + CI passed  → bump patch version, build docker image
#   2. Dependabot merge + CI failed  → revert the merge, open a PR explaining why
#   3. Manual push with version bump + CI passed → build docker image
#   4. Everything else               → nothing (CI results are enough)
#
# NOTE: For case 1/2 to trigger correctly, the CI workflow must be set as a
# required status check in branch protection so that --auto in
# dependabot-automerge.yml waits for CI before merging. Case 2 is a safety net
# for when that protection isn't active.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, beta]

permissions:
  contents: write
  pull-requests: write
  actions: write   # needed to trigger docker.yml via gh workflow run
  packages: read   # needed to check GHCR during release tagging

jobs:
  # ── Detect what kind of push this was ────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    # Only react to push events — ignore PR CI runs.
    if: github.event.workflow_run.event == 'push'
    outputs:
      is-dependabot: ${{ steps.ctx.outputs.is-dependabot }}
      version-bumped: ${{ steps.ctx.outputs.version-bumped }}
      version: ${{ steps.ctx.outputs.version }}
      ci-passed: ${{ steps.ctx.outputs.ci-passed }}
      branch: ${{ github.event.workflow_run.head_branch }}
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Detect context
        id: ctx
        run: |
          AUTHOR=$(git log -1 --format='%an' HEAD)
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"

          [[ "$AUTHOR" == "dependabot[bot]" ]] \
            && echo "is-dependabot=true"  >> $GITHUB_OUTPUT \
            || echo "is-dependabot=false" >> $GITHUB_OUTPUT

          [[ "$CONCLUSION" == "success" ]] \
            && echo "ci-passed=true"  >> $GITHUB_OUTPUT \
            || echo "ci-passed=false" >> $GITHUB_OUTPUT

          # Compare package.json version against the previous commit.
          PREV=$(git show HEAD~1:package.json \
            | node -e "let d=''; \
                process.stdin.on('data', c => d += c); \
                process.stdin.on('end', () => process.stdout.write(JSON.parse(d).version))")
          CURR=$(node -p "require('./package.json').version")
          [[ "$PREV" != "$CURR" ]] \
            && echo "version-bumped=true"  >> $GITHUB_OUTPUT \
            || echo "version-bumped=false" >> $GITHUB_OUTPUT

          echo "version=$CURR" >> $GITHUB_OUTPUT

  # ── Case 1: Dependabot merge + CI passed → bump version + build ──────────
  bump-and-build:
    needs: detect
    if: needs.detect.outputs.is-dependabot == 'true' && needs.detect.outputs.ci-passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect.outputs.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: ver
        run: |
          npm version patch --no-git-tag-version
          echo "new=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag v${{ steps.ver.outputs.new }} --output CHANGELOG.md

      - name: Commit and push
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: bump version [skip ci]"
          git push origin HEAD:${{ needs.detect.outputs.branch }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          BRANCH="${{ needs.detect.outputs.branch }}"
          # beta branch → pre-release; master → full release
          PRERELEASE_FLAG=""
          [[ "$BRANCH" == "beta" ]] && PRERELEASE_FLAG="--prerelease"
          gh release create "v${NEW_VERSION}" \
            --target "$BRANCH" \
            --title "v${NEW_VERSION}" \
            --generate-notes \
            $PRERELEASE_FLAG

      # Trigger the docker build workflow on the branch. By the time docker.yml
      # checks out the branch, the version bump commit is already there.
      - name: Trigger docker build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docker.yml --ref ${{ needs.detect.outputs.branch }}

  # ── Case 2: Dependabot merge + CI failed → revert + open PR ─────────────
  revert-on-failure:
    needs: detect
    if: needs.detect.outputs.is-dependabot == 'true' && needs.detect.outputs.ci-passed == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect.outputs.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Revert and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA_SHORT=$(echo "${{ needs.detect.outputs.sha }}" | cut -c1-7)
          REVERT_BRANCH="revert/dependabot-${SHA_SHORT}"

          git checkout -b "$REVERT_BRANCH"
          git revert HEAD --no-edit
          git push origin "$REVERT_BRANCH"

          gh pr create \
            --base  "${{ needs.detect.outputs.branch }}" \
            --head  "$REVERT_BRANCH" \
            --title "Revert Dependabot update — CI failed ($SHA_SHORT)" \
            --body  "CI failed after merging a Dependabot update. This PR reverts that merge.

          **Failed run:** ${{ github.event.workflow_run.html_url }}
          **Commit:** \`${{ needs.detect.outputs.sha }}\`

          Review the CI failure linked above before deciding whether to re-apply the update."

  # ── Case 3: Manual push with version bump + CI passed → release + build ──
  build-on-version-bump:
    needs: detect
    if: |
      needs.detect.outputs.is-dependabot == 'false' &&
      needs.detect.outputs.version-bumped == 'true' &&
      needs.detect.outputs.ci-passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect.outputs.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag v${{ needs.detect.outputs.version }} --output CHANGELOG.md

      - name: Commit changelog
        run: |
          git diff --quiet CHANGELOG.md 2>/dev/null || {
            git add CHANGELOG.md
            git commit -m "docs: update changelog [skip ci]"
            git push origin HEAD:${{ needs.detect.outputs.branch }}
          }

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          BRANCH="${{ needs.detect.outputs.branch }}"
          PRERELEASE_FLAG=""
          [[ "$BRANCH" == "beta" ]] && PRERELEASE_FLAG="--prerelease"
          gh release create "v${VERSION}" \
            --target "$BRANCH" \
            --title "v${VERSION}" \
            --generate-notes \
            $PRERELEASE_FLAG

      - name: Trigger docker build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docker.yml --ref ${{ needs.detect.outputs.branch }}
