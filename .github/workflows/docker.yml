name: Build & Push Docker Image

run-name: "Docker build · v${{ inputs.version || github.ref_name }}"

# Only workflow_dispatch — docker builds are orchestrated by ci.yml.
# The tag push trigger was removed to avoid double-builds when ci.yml
# creates a GitHub Release (which also pushes a v* tag).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version being built (e.g. 1.2.3)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version and branch context
        id: ctx
        run: |
          VERSION="${{ inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "beta" ]]; then
            # Convention: pre-release images are tagged with -beta suffix,
            # e.g. 1.3.0-beta. The floating "beta" tag points to the latest.
            echo "vtag=${VERSION}-beta"          >> $GITHUB_OUTPUT
            echo "channel=beta"                  >> $GITHUB_OUTPUT
            echo "is_master=false"               >> $GITHUB_OUTPUT
            echo "is_beta=true"                  >> $GITHUB_OUTPUT
            echo "major_minor="                  >> $GITHUB_OUTPUT
          else
            # Stable: version tag + major.minor convenience tag + latest.
            MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
            echo "vtag=${VERSION}"               >> $GITHUB_OUTPUT
            echo "channel=latest"                >> $GITHUB_OUTPUT
            echo "is_master=true"                >> $GITHUB_OUTPUT
            echo "is_beta=false"                 >> $GITHUB_OUTPUT
            echo "major_minor=${MAJOR_MINOR}"    >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.ctx.outputs.channel }}
            type=raw,value=${{ steps.ctx.outputs.vtag }}
            type=raw,value=${{ steps.ctx.outputs.major_minor }},enable=${{ steps.ctx.outputs.is_master }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
