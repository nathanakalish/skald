[changelog]
header = "# Changelog\n\n"
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\n"""
trim = true

[git]
conventional_commits = true
# Include commits that don't follow the convention rather than dropping them.
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^chore\\(deps\\)", group = "Dependency updates" },
  # Skip housekeeping commits that aren't useful in a changelog.
  { message = "^chore|^ci|^docs|^style|^test|bump version|\\[skip ci\\]", skip = true },
  # Catch everything else (non-conventional commit messages).
  { message = ".*", group = "Changes" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
